<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>varr</title>
    <script src="https://kit.fontawesome.com/a001804068.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="flowers"><img src="img/rose.png" id="flower1" class="pic"></div>
    <div id="leaves"><img src="img/canvas.png" id="flower2" class="pic"></div>
    <div id="blur"></div>
    <div id="wall"></div>
    <div id="overlay"></div>
    <div id="heartui"></div>
    <input type="checkbox" id="toggle">
    <label for="toggle" id="heart">
        <div id="content" class="content">
            <div id="incontent" >
                <div id="ttle">NHAP MAT KHAU</div>
                <input type="text" id="pass" placeholder="nhap mat khau">
                <button id="butt">ENTER</button>
            </div>

            <button id="back" hidden><i class="fa-solid fa-rotate-left"></i></button>
            <div id="yes" hidden>
                <div id="secret"><i class="material-icons" id="mail">email</i></div>
            </div>
            <div id="no" hidden>sai</div>
        </div>
    </label>
    <div id="finale">
        <p id="yeu">Chúc yêu 8/3 luôn vui vẻ mạnh giỏi yêu đời xinh đẹp và gặp thật nhiều may mắn nha!!</p>
    </div>
    <script>
        const MobileOption = (() => {
        const isMobile = window.innerWidth < 768;

        const config = {
            enabled: true,

            desktop: {
            maxA: 90,
            waveDelay: 120,
            scale: 1,
            },

            mobile: {
            maxA: 40,
            waveDelay: 160,
            scale: 0.85,
            }
        };

        const mode = (config.enabled && isMobile)
            ? config.mobile
            : config.desktop;

        return {
            isMobile,
            maxA: mode.maxA,
            waveDelay: mode.waveDelay,
            scale: mode.scale,

            applyStyle() {
            document.documentElement.style.setProperty(
                "--A-scale",
                mode.scale
            );
            },

            bindResize() {
            let lastMode = this.isMobile;

            window.addEventListener("resize", () => {
                const nowMobile = window.innerWidth < 768;

                lastMode = nowMobile;
            });
            }
        };
        })();

        MobileOption.applyStyle();
        MobileOption.bindResize();

        const wall = document.getElementById("wall");
        const word = ["I","L","O","V","E","Y","O","U"];

        const AWidth  = 40;
        const AHeight = 150;

        const cols = Math.floor(window.innerWidth  / AWidth);
        const rows = Math.floor(window.innerHeight / AHeight);


        const cells = [];
        for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            cells.push({ r, c });
        }
        }


        cells.sort(() => Math.random() - 0.5);


        const count = Math.min(cells.length, MobileOption.maxA);

        for (let i = 0; i < count; i++) {
        const { r, c } = cells[i];

        const A = document.createElement("div");
        A.className = "A";

        const jitterX = (Math.random() - 0.5) * 8;
        const jitterY = (Math.random() - 0.5) * 8;

        A.style.left = (c + Math.random()) * AWidth  + "px";
        A.style.top  = (r + Math.random()) * AHeight + "px";

        for (let ch of word) {
            const span = document.createElement("span");
            span.textContent = ch;
            A.appendChild(span);
        }

        wall.appendChild(A);
        }

        const letters = document.querySelectorAll(".A span");

        const AtoB = [
            "#f9bcff",
            "#f9b6fb",
            "#f9aff6",
            "#f9a9f2",
            "#f9a3ee",
            "#fa9cea",
            "#fa96e5",
            "#fa90e1",
            "#fa89dd",
            "#fb83d9",
            "#fb7dd4",
            "#fb76d0",
            "#fb70cc",
            "#fc69c8",
            "#fc63c3",
            "#fc5dbf",
            "#fc56bb",
            "#fd50b7",
            "#fd49b2",
            "#ff3d9a"
        ];

        const BtoA = [...AtoB].reverse();

        let index = 0;
        let toB = true;

        function stepWave() {
            letters.forEach(l => l.style.color = AtoB[0]);

            const forward  = toB ? AtoB : BtoA;
            const backward = toB ? BtoA : AtoB;

            for (let i = 0; i < forward.length; i++) {
                const front = index - i;
                const back  = index + i;

                if (letters[front]) letters[front].style.color = forward[i];
                if (letters[back])  letters[back].style.color  = backward[i];
            }

            index++;
            if (index >= letters.length + forward.length) {
                index = 0;
                toB = !toB;
            }
        }

        const STEP = MobileOption.waveDelay;
        let acc = 0;
        let last = performance.now();

        function loop(now) {
            acc += now - last;
            last = now;

            while (acc >= STEP) {
                stepWave();
                acc -= STEP;
            }

            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);

        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                acc = 0;
            }
        });

        const ANSWER = "19032009";

        const butt = document.getElementById("butt");
        const pass = document.getElementById("pass");
        const yes = document.getElementById("yes");
        const no = document.getElementById("no");
        const incontent = document.getElementById("incontent");
        const back = document.getElementById("back");
        const mail = document.getElementById("mail");
        const secret = document.getElementById("secret");
        const blurring = document.getElementById("blur");

        pass.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                butt.click();
            }
        });

        butt.onclick = () => {
            const value = pass.value.trim();
            
            if (value.trim() === "") {
                yes.hidden = true;
                no.hidden = true;
                return;
            }
            if (value === ANSWER) {
                yes.hidden = false;
                no.hidden = true;
                incontent.hidden = true;
                back.hidden = false;

                mail.style.transition = "opacity 0.3s";
                mail.style.opacity = 1;

                document.querySelectorAll("#flowers img").forEach(f => {
                    f.style.opacity = "1";
                });
                document.querySelectorAll("#flowers img").forEach(f => {

                    if(f.src.includes("rose")){
                        f.classList.add("flower-show");
                    }else{
                        if(f.dataset.side === "right"){
                            f.classList.add("leaf-right");
                        }else{
                            f.classList.add("leaf-left");
                        }
                    }

                });
            } else {
                yes.hidden = true;
                no.hidden = false;
                incontent.hidden = true;
                back.hidden = false;
            }
        };

        back.onclick = () => {
            yes.hidden = true;
            no.hidden = true;
            incontent.hidden = false;
            back.hidden = true;
            resetFlowers();
        }

        secret.onclick = () => {
            blurring.style.backdropFilter = "blur(10px)";
            blurring.style.backgroundColor = "rgba(255,255,255,0.05)"
            blurring.style.zIndex = 20;
            setTimeout(() => {
                document.getElementById("finale").classList.add("show");
                document.getElementById("finale").style.zIndex = 21;
            }, 500);
        }

        blurring.onclick = () => {
            blurring.style.backdropFilter = "none";
            blurring.style.backgroundColor = "none";
            blurring.style.zIndex = 2;
            document.getElementById("finale").classList.remove("show");
            document.getElementById("finale").style.zIndex = 1;
        }


        function createFlower(a,x,y,scale,deg,z,display){ 
            const template = document.getElementById("flower" + a);
            const flower = template.cloneNode(true); flower.removeAttribute("id");
            flower.hidden = false;
            flower.style.position = "absolute";
            flower.style.left = x + "px";
            flower.style.top = y + "px";
            flower.style.transform = `scale(${scale}) rotate(${deg}deg)`;
            let vis = "";
            if(display === 1) {
                vis = "block"; 
            } else {
                vis = "none"; 
            } 
            flower.style.display = vis;
            flower.style.zIndex = z;
            flower.style.opacity = 0;
            flower.style.transition = "opacity 1s ease";
            flower.style.setProperty("--s", scale);
            flower.style.setProperty("--r", deg + "deg");
            flower.dataset.side = "left";
            document.getElementById("flowers").appendChild(flower);
            return flower;
        }

        const W = window.innerWidth;
        const H = window.innerHeight;
        const scale = W < 768 ? 0.7 : 1;

        function mirrorFlower(a,x,y,scale,deg,z,display){
            const W = window.innerWidth;
            const H = window.innerHeight;

            createFlower(
                a,
                W - x,
                H - y,
                scale,
                deg + 180,
                z,
                display
            );
            flower.dataset.side = "right";
        }

        if (W < 768) {
            createFlower(1, W*0.05, H*0.83, 2, 0,10,1);
            createFlower(1, W*0.3, H*0.9, 1.5,0,10,1);
            createFlower(1, W*-0.03, H*0.65,1,7,10,1);
            createFlower(1, W*-0.07, H*0.55,0.5,30,10,1);

            createFlower(2, W*0.35, H*0.93, 2,30,9,1);
            createFlower(2, W*0.3, H*0.93, 2,10,9,1);
            createFlower(2, W*-0.02, H*0.55,0.75,0.5,9,1);
            createFlower(2, W*0.1, H*0.7,1.5,20,9,1);

            mirrorFlower(1, W*0.15, H*1, 2, 0,10,1);
            mirrorFlower(1, W*0.45, H*1.01, 1.5,0,10,1);
            mirrorFlower(1, W*0.15, H*0.8,1,7,10,1);
            mirrorFlower(1, W*0.15, H*0.7,0.5,30,10,1);

            mirrorFlower(2, W*0.45, H*1.05, 2,30,9,1);
            mirrorFlower(2, W*0.45, H*1, 2,10,9,1);
            mirrorFlower(2, W*-0.02, H*0.55,0.75,0.5,9,1);
            mirrorFlower(2, W*0.1, H*0.7,1.5,10,9,1);

        } else {
            createFlower(1, W*0.03, H*0.8, 3,0,10,1);
            createFlower(1, W*0.2, H*0.9, 2,0,10,1);
            createFlower(1, W*0.1, H*1.1, 3,0,10,1);
            createFlower(1, W*-0.01, H*0.53,1,0,10,1);

            createFlower(2, W*0.005, H*1.1,3,-120,9,1);
            createFlower(2, W*0.3, H*0.9,2,30,9,1);
            createFlower(2, W*0.3, H*1,2,60,9,1);
            createFlower(2, W*0.21, H*1.05,2,90,9,1);

            mirrorFlower(1, W*0.03, H*0.8,3,0,10,1);
            mirrorFlower(1, W*0.2, H*0.9,2,0,10,1);
            mirrorFlower(1, W*0.1, H*1.1,3,0,10,1);
            mirrorFlower(1, W*-0.01, H*0.53,1,0,10,1);

            mirrorFlower(2, W*0.005, H*1.1,3,-120,9,1);
            mirrorFlower(2, W*0.3, H*0.9,2,30,9,1);
            mirrorFlower(2, W*0.3, H*1,2,60,9,1);
            mirrorFlower(2, W*0.21, H*1.05,2,90,9,1);
        }

        function resetFlowers(){
            document.querySelectorAll("#flowers img").forEach(f => {
                f.style.opacity = "0";
                f.classList.remove("flower-show");
                f.classList.remove("leaf-left");
                f.classList.remove("leaf-right");
            });
        }
    </script>
</body>
</html>
